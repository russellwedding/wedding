<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russell & Alcelene's Wedding</title>
    
    <!-- Elegant Wedding Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        /* --- BASE RESET & THEME STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0b111e; /* Midnight Dark Navy */
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Universal Decorative Headings */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            letter-spacing: 4px;
            color: #d4af37; /* Rose Gold / Elegant Gold Accent */
            margin-bottom: 10px;
        }
        .section-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 50px;
        }
        .divider {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            margin: 20px 0;
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* --- 1. HERO SECTION --- */
        .hero-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(11, 17, 30, 0.85), rgba(11, 17, 30, 0.85)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            padding-bottom: 40px;
        }
        .navbar {
            width: 100%;
            padding: 25px 20px;
            background: linear-gradient(to bottom, rgba(11, 17, 30, 0.9), rgba(11, 17, 30, 0));
            z-index: 10;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px 25px;
            list-style: none;
            max-width: 1100px;
            margin: 0 auto;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #d4af37;
        }
        .main-content {
            text-align: center;
            padding: 20px;
            z-index: 2;
            margin-top: auto;
            margin-bottom: auto;
        }
        .sub-title-top {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }
        .couple-names {
            font-family: 'Cinzel', serif;
            font-size: 65px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 2px;
        }
        .ampersand {
            font-family: 'Pinyon Script', cursive;
            font-size: 55px;
            display: block;
            margin: 5px 0;
            color: #d4af37;
        }
        .wedding-date {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .wedding-location {
            font-style: italic;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            max-width: 750px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }
        .event-details-box {
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 40px;
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d4af37;
        }

        /* --- TIMERS --- */
        .countdown-section {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-top: auto;
            z-index: 2;
        }
        .countdown-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }
        .countdown-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 450px;
            margin: 0 auto;
        }
        .countdown-item {
            display: flex;
            align-items: baseline;
        }
        .countdown-number {
            font-size: 45px;
            font-weight: 200;
        }
        .countdown-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 5px;
        }
        .slash-divider {
            font-size: 35px;
            font-weight: 100;
            color: rgba(255, 255, 255, 0.15);
        }

        /* --- STYLES PARA SA BUONG MGA SECTIONS --- */
        section {
            padding: 90px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 850px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* 2. Story Section */
        .story-text {
            font-size: 15px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.85);
            font-style: italic;
        }

        /* 3. Maps Section */
        .map-box {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }
        .map-box iframe {
            width: 100%;
            height: 400px;
            border: 0;
            display: block;
        }

        /* 4. Program Timeline Section */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 500px;
            margin: 0 auto;
        }
        .timeline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid #d4af37;
            border-radius: 0 8px 8px 0;
        }
        .time {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-weight: 600;
        }

        /* 5. Entourage Grid */
        .entourage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .entourage-group h3 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 16px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .entourage-group p {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            line-height: 1.8;
        }

        /* 6. Attire Palette */
        .palette-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* 7. Gift Section Guide */
        .gift-notice {
            font-size: 14px;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255,255,255,0.8);
        }

        /* 8. Music Request Button */
        .music-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .music-btn:hover {
            background: #d4af37;
            color: #0b111e;
            box-shadow: 0 0 15px rgba(212,175,55,0.4);
        }

        /* 9. FAQ Section */
        .faq-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
        }
        .faq-item {
            margin-bottom: 25px;
            background: rgba(255,255,255,0.01);
            padding: 20px;
            border-radius: 8px;
        }
        .faq-q {
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .faq-a {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
