<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russell & Alcelene Wedding</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #333;
    }
    header {
      background: #444;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #eee;
      padding: 10px;
      text-align: center;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #444;
      font-weight: bold;
    }
    section {
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }
    #map iframe {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1/1;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: block;
      margin: auto;
    }
    footer {
      background: #444;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Russell & Alcelene's Wedding</h1>
    <p>September 23, 2026</p>
  </header>

  <nav>
    <a href="#details">Details</a>
    <a href="#countdown">Countdown</a>
    <a href="#rsvp">RSVP</a>
    <a href="#map">Venue</a>
  </nav>

  <section id="details">
    <h2>Wedding Details</h2>
    <p>Join us as we celebrate our wedding day at San Isidro Labrador Parish Church, Valenzuela City.</p>
  </section>

  <section id="countdown">
    <h2>Countdown</h2>
    <p id="timer"></p>
    <script>
      const weddingDate = new Date("September 23, 2026 08:00:00").getTime();
      const x = setInterval(function() {
        const now = new Date().getTime();
        const distance = weddingDate - now;
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById("timer").innerHTML =
          days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
        if (distance < 0) {
          clearInterval(x);
          document.getElementById("timer").innerHTML = "It's Wedding Day!";
        }
      }, 1000);
    </script>
  </section>

  <section id="rsvp">
    <h2>RSVP</h2>
    <p>Please confirm your attendance below:</p>
    <!-- Embed code from Google Form -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScRkpR0EtUNXcvJPZcaPuwZKu95CJSZoNGE0otvzWyFoyyGCw/viewform?embedded=true"
            width="640" height="845" frameborder="0" marginheight="0" marginwidth="0">
      Loading…
    </iframe>
  </section>

  <section id="map">
    <h2>Venue Map</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." 
            allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </section>

  <footer>
    <p>© 2026 Russell & Alcelene Wedding</p>
  </footer>

</body>
</html>
