<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russell & Alcelene's Wedding</title>
    
    <!-- Elegant Wedding Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        /* --- SMART FIXED LAYOUT --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0b111e; /* Midnight Dark Theme */
            color: #ffffff;
            overflow-x: hidden;
        }
        
        /* Typography gaya ng nasa Video */
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            letter-spacing: 4px;
            color: #d4af37; /* Gold Accent */
            margin-bottom: 10px;
        }
        .section-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
        }

        /* --- 1. HERO HOME SECTION --- */
        .hero-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(rgba(11, 17, 30, 0.85), rgba(11, 17, 30, 0.85)), 
                        url('https://unsplash.com') no-repeat center center/cover;
            padding-bottom: 40px;
        }
        .navbar {
            width: 100%;
            padding: 25px 20px;
            background: linear-gradient(to bottom, rgba(11, 17, 30, 0.9), rgba(11, 17, 30, 0));
            z-index: 10;
        }
        .nav-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px 25px;
            list-style: none;
            max-width: 1100px;
            margin: 0 auto;
        }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #d4af37;
        }
        .main-content {
            text-align: center;
            padding: 20px;
            z-index: 2;
            margin-top: auto;
            margin-bottom: auto;
        }
        .sub-title-top {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 25px;
        }
        .couple-names {
            font-family: 'Cinzel', serif;
            font-size: 65px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 2px;
        }
        .ampersand {
            font-family: 'Pinyon Script', cursive;
            font-size: 55px;
            display: block;
            margin: 5px 0;
            color: #d4af37;
        }
        .wedding-date {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .wedding-location {
            font-style: italic;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            max-width: 750px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }
        .event-details-box {
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 12px 40px;
            display: inline-block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d4af37;
        }

        /* --- CONTINUOUS SCROLL CONTENT SECTIONS --- */
        section {
            padding: 90px 20px;
            text-align: center;
            background-color: #0b111e;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 850px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Maps Section */
        .map-box {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .map-box iframe {
            width: 100%;
            height: 450px;
            border: 0;
            display: block;
        }

        /* Program Timeline */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .timeline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #d4af37;
            border-radius: 0 8px 8px 0;
        }
        .time {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-weight: 600;
        }

        /* Entourage Grid */
        .entourage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .entourage-group h3 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 16px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .entourage-group p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.8;
        }

        /* Attire Palette */
        .palette-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .color-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Music Corner Button */
        .music-btn {
            display: inline-block;
            padding: 12px 35px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 30px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .music-btn:hover {
            background: #d4af37;
            color: #0b111e;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* FAQ Guide */
        .faq-container {
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
        }
        .faq-item {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 8px;
        }
        .faq-q {
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .faq-a {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.6;
        }

        /* RSVP Section */
        .form-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
        }
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 800px;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* Mobile View Adjustments */
        @media (max-width: 768px) {
            .nav-links { gap: 10px 15px; }
            .nav-links a { font-size: 9px; }
            .couple-names { font-size: 45px; }
            .ampersand { font-size: 40px; }
            .section-title { font-size: 26px; }
            .map-box iframe { height: 350px; }
            .iframe-wrapper { height: 900px; }
        }
    </style>
</head>
<body>

    <!-- 1. HERO HOME SECTION -->
    <div class="hero-container">
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="#story">Story</a></li>
                <li><a href="#maps">Maps</a></li>
                <li><a href="#program">Program</a></li>
                <li><a href="#entourage">Entourage</a></li>
                <li><a href="#attire">Attire</a></li>
                <li><a href="#gifts">Gifts</a></li>
                <li><a href="#music">Music</a></li>
                <li><a href="#faq">FAQ</a></li>
                <li><a href="#rsvp">RSVP</a></li>
            </ul>
        </nav>

        <div class="main-content">
